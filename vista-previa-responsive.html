<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vista previa — panel del organizador</title>
<style>
  :root {
    --bg: #EAF3EC; --panel: #FFFFFF; --panelAlt: #F1F7F1;
    --ink: #33453E; --inkDim: #84958C;
    --gold: #EAC27A; --goldText: #C6902E;
    --rose: #D98A82; --roseDim: #B85C55; --line: #DCEAE0;
  }
  body.dark {
    --bg: #152420; --panel: #1E332B; --panelAlt: #26392F;
    --ink: #EDE6D6; --inkDim: #93A69B;
    --gold: #E3B563; --goldText: #F2CE87;
    --rose: #D98A82; --roseDim: #E8A39B; --line: #334A3F;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    transition: background .4s ease, color .4s ease;
  }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 20px 16px 60px; }
  .topbar { display:flex; justify-content:space-between; align-items:center; margin-bottom: 10px; }
  .devicetag { font-size: 11px; font-weight: 800; color: var(--inkDim); letter-spacing:.06em; text-transform:uppercase; }
  .themebtn {
    font-size: 11px; font-weight: 800; padding: 7px 12px; border-radius: 999px;
    border: 1px solid var(--line); background: var(--panel); color: var(--ink); cursor: pointer;
  }
  h1 { text-align:center; font-family: Georgia, serif; font-size: 22px; margin: 6px 0 2px; }
  .sub { text-align:center; font-size: 12px; color: var(--inkDim); margin-bottom: 22px; }
  .grid { display: grid; grid-template-columns: 1fr; gap: 16px; max-width: 640px; margin: 0 auto; }
  @media (min-width: 1024px) {
    .grid { grid-template-columns: 1fr 1fr; max-width: 900px; }
  }
  .card {
    background: var(--panel); border: 1px solid var(--line); border-radius: 22px;
    box-shadow: 0 2px 10px rgba(51,69,62,0.06); padding: 18px;
  }
  .card h2 { font-size: 14px; color: var(--gold); margin: 0 0 12px; }
  input {
    width: 100%; padding: 10px 12px; border-radius: 14px; border: 1px solid var(--line);
    background: var(--bg); color: var(--ink); font-size: 14px; margin-bottom: 8px;
  }
  .btn-gold {
    width: 100%; padding: 10px 0; border-radius: 14px; border: none; font-weight: 800;
    background: var(--gold); color: var(--ink); font-size: 14px;
  }
  .team-row {
    display:flex; align-items:center; gap:8px; padding: 8px 10px; border-radius: 14px;
    background: var(--panelAlt); margin-bottom: 8px;
  }
  .team-row .name { font-weight: 700; font-size: 14px; flex:1; }
  .pill {
    font-size: 11px; font-weight: 800; padding: 4px 10px; border-radius: 999px;
    border: 1px solid var(--gold);
  }
  .pill.paid { background: var(--gold); color: var(--ink); }
  .pill.due { color: var(--inkDim); }

  .bracket-title { text-align:center; font-size:13px; font-weight:800; color: var(--gold); margin: 26px 0 14px; }
  .bracket { display:flex; gap: 16px; overflow-x:auto; justify-content:center; max-width: 900px; margin: 0 auto; }
  .col { flex-shrink:0; width: 180px; }
  .col-title { text-align:center; font-size:10px; font-weight:800; text-transform:uppercase; color: var(--inkDim); margin-bottom:10px; }
  .match { background: var(--panel); border:1px solid var(--line); border-radius: 16px; padding: 8px; margin-bottom: 14px; }
  .match .t { padding: 6px 8px; border-radius: 10px; font-size:13px; font-weight:600; }
  .match .t.win { background: rgba(234,194,122,0.3); color: var(--goldText); }
  .match .t.lose { color: var(--inkDim); opacity:.5; text-decoration: line-through; }
  .match .div { height:1px; background: var(--line); margin: 3px 0; }

  footer { text-align:center; margin-top: 40px; }
  footer a { color: var(--inkDim); text-decoration:none; font-size: 14px; font-weight:700; }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <span class="devicetag" id="deviceTag">—</span>
    <button class="themebtn" onclick="toggleTheme()" id="themeBtn">🌙 Modo oscuro</button>
  </div>
  <h1>Torneo Lunes · panel del organizador</h1>
  <div class="sub">Córdoba, Vidon Bar, Achával · 13/07/2026 · 2v2</div>

  <div class="grid">
    <div class="card">
      <h2>ANOTAR EQUIPO</h2>
      <input placeholder="Nombre del equipo" value="4 Baby" readonly />
      <input placeholder="Jugadores (opcional)" value="Fede, Tomi" readonly />
      <button class="btn-gold">+ Agregar equipo</button>
    </div>
    <div class="card">
      <h2>EQUIPOS ANOTADOS (4)</h2>
      <div class="team-row"><span class="name">Sol de Mayo</span><span class="pill paid">Pagó</span></div>
      <div class="team-row"><span class="name">4 Baby</span><span class="pill due">Debe</span></div>
      <div class="team-row"><span class="name">Los Ases</span><span class="pill paid">Pagó</span></div>
      <div class="team-row"><span class="name">Ancho Falso</span><span class="pill paid">Pagó</span></div>
    </div>
  </div>

  <div class="bracket-title">CUADRO PRINCIPAL</div>
  <div class="bracket">
    <div class="col">
      <div class="col-title">Semifinal</div>
      <div class="match">
        <div class="t win">Sol de Mayo</div>
        <div class="div"></div>
        <div class="t lose">Ancho Falso</div>
      </div>
      <div class="match">
        <div class="t">4 Baby</div>
        <div class="div"></div>
        <div class="t">Los Ases</div>
      </div>
    </div>
    <div class="col">
      <div class="col-title">Final</div>
      <div class="match">
        <div class="t">Sol de Mayo</div>
        <div class="div"></div>
        <div class="t">Por definir</div>
      </div>
    </div>
  </div>

  <footer>
    <a href="https://instagram.com/truco.cordoba" target="_blank">📸 @truco.cordoba</a>
  </footer>
</div>

<script>
  function toggleTheme() {
    const dark = document.body.classList.toggle("dark");
    document.getElementById("themeBtn").textContent = dark ? "☀️ Modo día" : "🌙 Modo oscuro";
  }
  function updateTag() {
    document.getElementById("deviceTag").textContent =
      window.innerWidth >= 1024 ? "vista escritorio" : "vista celular";
  }
  window.addEventListener("resize", updateTag);
  updateTag();
</script>
</body>
</html>
